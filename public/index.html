<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8" />
        <meta http-equiv="X-UA-Compatible" content="IE=edge" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <meta name="supported-color-schemes" content="light dark" />
        <title>Weather app</title>
        <link rel="stylesheet" href="./style.css" />
        <script src="./js/script.js" type="module" defer></script>
    </head>
    <body>
        <header>
            <svg
                xmlns="http://www.w3.org/2000/svg"
                viewBox="0 0 640 512"
                data-actual-weather="false"
                class="logo"
            >
                <!--! Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. -->
                <path
                    d="M0 336c0 79.5 64.5 144 144 144H512c70.7 0 128-57.3 128-128c0-61.9-44-113.6-102.4-125.4c4.1-10.7 6.4-22.4 6.4-34.6c0-53-43-96-96-96c-19.7 0-38.1 6-53.3 16.2C367 64.2 315.3 32 256 32C167.6 32 96 103.6 96 192c0 2.7 .1 5.4 .2 8.1C40.2 219.8 0 273.2 0 336z"
                />
            </svg>
            <select title="Choose your language" name="lang" id="lang-menu">
                <option value="portuguese">Português</option>
                <option value="english">Inglês</option>
            </select>
        </header>
        <main>
          <h1>See weather data</h1>
          <div class="user-location">
            <button title="Choose your location" type="button">
              <svg class="icon map-location" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 576 512"><!--! Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. --><path d="M408 120c0 54.6-73.1 151.9-105.2 192c-7.7 9.6-22 9.6-29.6 0C241.1 271.9 168 174.6 168 120C168 53.7 221.7 0 288 0s120 53.7 120 120zm8 80.4c3.5-6.9 6.7-13.8 9.6-20.6c.5-1.2 1-2.5 1.5-3.7l116-46.4C558.9 123.4 576 135 576 152V422.8c0 9.8-6 18.6-15.1 22.3L416 503V200.4zM137.6 138.3c2.4 14.1 7.2 28.3 12.8 41.5c2.9 6.8 6.1 13.7 9.6 20.6V451.8L32.9 502.7C17.1 509 0 497.4 0 480.4V209.6c0-9.8 6-18.6 15.1-22.3l122.6-49zM327.8 332c13.9-17.4 35.7-45.7 56.2-77V504.3L192 449.4V255c20.5 31.3 42.3 59.6 56.2 77c20.5 25.6 59.1 25.6 79.6 0zM288 152a40 40 0 1 0 0-80 40 40 0 1 0 0 80z"/></svg>
              <span class="location">Salvador, Bahia, Brazil</span>
            </button>
            <dialog class="choose-location">
              <label for="location-search">Choose your place</label>
              <input type="text" name="location-search" id="location" placeholder="Ex.: Salvador">
              <button type="button">Define Location</button>
            </dialog>
          </div>
          <section class="alert" data-window="alert" data-size="small">
            <h2 class="title">Alerts</h2>
            <details>
              <summary>Exemplo</summary>
              <p>Alerta para a região</p>
            </details>
          </section>
          <section class="real-time-weather" data-window="real-time" data-size="big">
            <h2 class="title">
              Real-time Data
              <svg class="icon last-update" title="Last Update: 2023-04-07 11:30" xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512"><!--! Font Awesome Pro 6.4.0 by @fontawesome - https://fontawesome.com License - https://fontawesome.com/license (Commercial License) Copyright 2023 Fonticons, Inc. --><path d="M256 512A256 256 0 1 0 256 0a256 256 0 1 0 0 512zM169.8 165.3c7.9-22.3 29.1-37.3 52.8-37.3h58.3c34.9 0 63.1 28.3 63.1 63.1c0 22.6-12.1 43.5-31.7 54.8L280 264.4c-.2 13-10.9 23.6-24 23.6c-13.3 0-24-10.7-24-24V250.5c0-8.6 4.6-16.5 12.1-20.8l44.3-25.4c4.7-2.7 7.6-7.7 7.6-13.1c0-8.4-6.8-15.1-15.1-15.1H222.6c-3.4 0-6.4 2.1-7.5 5.3l-.4 1.2c-4.4 12.5-18.2 19-30.6 14.6s-19-18.2-14.6-30.6l.4-1.2zM224 352a32 32 0 1 1 64 0 32 32 0 1 1 -64 0z"/></svg>
            </h2>
            <div class="weather-data">
              <img src="./assets/cloud-solid.svg" alt="Cloudy" class="icon weather">
              <div class="temperature">
                <div class="now">29</div>
                <div class="max-min">
                  <span class="max">30</span>
                  <span class="min">26</span>
                </div>
              </div>
              <div class="other-data">
                <div data-window="cloud" data-size="small">
                  Cloud
                  <span class="value">75</span>
                </div>
                <div data-window="feels-like" data-size="small">
                  Feels like
                  <span class="value">32</span>
                </div>
                <div data-window="humidity" data-size="small">
                  Humidity
                  <span class="value">75</span>
                </div>
                <div data-window="uv" data-size="small">
                  UV index
                  <span class="value">6</span>
                </div>
                <div data-window="wind-dir">
                  Wind direction
                  <span class="value">ESE</span>
                </div>
              </div>
            </div>
          </section>
          <section class="day-data" data-window="day">
            <h2 class="title">Day data</h2>
            
          </section>
        </main>
        <footer>
            <a href="https://www.weatherapi.com/" title="Free Weather API"
                ><img
                    src="https://cdn.weatherapi.com/v4/images/weatherapi_logo.png"
                    alt="Weather data by WeatherAPI.com"
                    border="0"
            /></a>
        </footer>
    </body>
</html>
